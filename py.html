<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>មេរៀន Python ជាភាសាខ្មែរ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        * {
            font-family: 'Inter', 'Khmer OS', 'Noto Sans Khmer', system-ui, sans-serif;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #4f46e5;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #818cf8;
        }

        .code-block {
            background: #0b0e1a;
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 20px 24px;
            margin: 12px 0;
            overflow-x: auto;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 0.85rem;
            color: #e2e8f0;
            position: relative;
        }

        .code-block .comment {
            color: #6b7280;
        }
        .code-block .keyword {
            color: #f472b6;
        }
        .code-block .string {
            color: #34d399;
        }
        .code-block .func {
            color: #60a5fa;
        }
        .code-block .number {
            color: #fbbf24;
        }
        .code-block .variable {
            color: #e8edf5;
        }
        .code-block .operator {
            color: #a78bfa;
        }

        .tab-content {
            display: none;
            animation: fadeSlide 0.4s ease;
        }
        .tab-content.active {
            display: block;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            border-color: #4f46e5;
            box-shadow: 0 8px 30px rgba(79, 70, 229, 0.08);
            transform: translateY(-2px);
        }

        .back-top {
            transition: all 0.3s ease;
            opacity: 0;
            pointer-events: none;
        }
        .back-top.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .back-top:hover {
            transform: scale(1.1);
        }

        /* Try it yourself - Interactive editor */
        .editor-area {
            background: #0b0e1a;
            border-radius: 12px;
            border: 1px solid #1e293b;
            overflow: hidden;
        }

        .editor-area textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: #e2e8f0;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 0.85rem;
            padding: 16px;
            resize: vertical;
            min-height: 120px;
            outline: none;
            line-height: 1.7;
        }

        .editor-area textarea:focus {
            border-color: #4f46e5;
        }

        .output-area {
            background: #0b0e1a;
            border-top: 1px solid #1e293b;
            padding: 12px 16px;
            min-height: 40px;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 0.85rem;
            color: #34d399;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .output-area.error {
            color: #f472b6;
        }

        .run-btn {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .run-btn:hover {
            background: #6366f1;
            transform: scale(1.02);
        }

        .run-btn:active {
            transform: scale(0.95);
        }

        .lesson-progress {
            position: sticky;
            top: 0;
            z-index: 50;
            background: #0f172a;
            border-bottom: 1px solid #1e293b;
            padding: 12px 0;
            backdrop-filter: blur(10px);
        }

        .progress-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #1e293b;
            transition: all 0.3s ease;
        }
        .progress-dot.completed {
            background: #34d399;
            box-shadow: 0 0 12px rgba(52, 211, 153, 0.3);
        }
        .progress-dot.active {
            background: #4f46e5;
            box-shadow: 0 0 12px rgba(79, 70, 229, 0.4);
        }
        .progress-dot:hover {
            transform: scale(1.2);
        }

        .glow-bg {
            animation: glowPulse 8s ease-in-out infinite;
        }
        @keyframes glowPulse {
            0%,
            100% {
                transform: scale(1);
                opacity: 0.4;
            }
            50% {
                transform: scale(1.1);
                opacity: 0.8;
            }
        }

        .floating-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
        }
        .floating-shapes span {
            position: absolute;
            display: block;
            width: 20px;
            height: 20px;
            background: rgba(79, 70, 229, 0.05);
            border-radius: 50%;
            animation: float 15s infinite;
        }
        .floating-shapes span:nth-child(1) {
            top: 10%;
            left: 5%;
            animation-delay: 0s;
            width: 40px;
            height: 40px;
        }
        .floating-shapes span:nth-child(2) {
            top: 20%;
            right: 10%;
            animation-delay: 2s;
            width: 30px;
            height: 30px;
        }
        .floating-shapes span:nth-child(3) {
            bottom: 30%;
            left: 15%;
            animation-delay: 4s;
            width: 50px;
            height: 50px;
        }
        .floating-shapes span:nth-child(4) {
            bottom: 20%;
            right: 5%;
            animation-delay: 1s;
            width: 35px;
            height: 35px;
        }
        .floating-shapes span:nth-child(5) {
            top: 50%;
            left: 50%;
            animation-delay: 3s;
            width: 25px;
            height: 25px;
        }

        @keyframes float {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        @media (max-width: 640px) {
            .code-block {
                font-size: 0.7rem;
                padding: 14px 16px;
            }
            .editor-area textarea {
                font-size: 0.75rem;
                padding: 12px;
            }
        }
    </style>
</head>

                print("1. បន្ថែមទំនាក់ទំនង")
                print("2. បង្ហាញទំនាក់ទំនងទាំងអស់")
                print("3. ស្វែងរកទំនាក់ទំនង")
                print("4. លុបទំនាក់ទំនង")
                print("5. ចេញ")

                choice = input("\\nជ្រើសរើសជម្រើស (1-5): ")

                if choice == "1":
                    add_contact()
                elif choice == "2":
                    view_contacts()
                elif choice == "3":
                    search_contact()
                elif choice == "4":
                    delete_contact()
                elif choice == "5":
                    print("សូមអរគុណសម្រាប់ការប្រើប្រាស់កម្មវិធី! 👋")
                    break
                else:
                    print("ជម្រើសមិនត្រឹមត្រូវ! សូមជ្រើសរើស 1-5\\n")</textarea>
                            <div class="flex items-center justify-between px-4 py-2 bg-[#0f172a] border-t border-[#1e293b]">
                                <button class="run-btn" onclick="runCodeWithInput('editor11', 'output11')">▶️ រត់កូដ</button>
                                <span class="text-[#94a3b8] text-xs">ប្រើប្រាស់កម្មវិធីតាមរយៈប្រអប់ popup</span>
                            </div>
                            <div class="output-area" id="output11">លទ្ធផលនឹងបង្ហាញនៅទីនេះ...</div>
                        </div>
                    </div>
                `
            }];

            // ===== GENERATE TABS =====
            const tabNav = document.getElementById('tabNav');
            const tabContainer = document.getElementById('tabContainer');
            const progressDots = document.getElementById('progressDots');
            const progressText = document.getElementById('progressText');

            let currentTab = 0;

            function generateTabs() {
                // Generate nav buttons
                lessons.forEach((lesson, index) => {
                    const btn = document.createElement('button');
                    btn.className =
                        `tab-btn px-3 py-2 rounded-lg text-sm font-semibold transition-all duration-300 bg-transparent text-[#94a3b8] hover:bg-[#1e293b] hover:text-[#e8edf5] active-tab:bg-[#4f46e5] active-tab:text-white active-tab:shadow-lg active-tab:shadow-[#4f46e5]/30`;
                    btn.setAttribute('data-tab', lesson.id);
                    btn.innerHTML = `${lesson.icon} ${lesson.title.replace(/^\d+[️⃣]?\s*/, '')}`;
                    tabNav.appendChild(btn);

                    // Generate content
                    const content = document.createElement('div');
                    content.className = 'tab-content';
                    content.id = lesson.id;
                    content.innerHTML = lesson.content;
                    tabContainer.appendChild(content);

                    // Generate progress dots
                    const dot = document.createElement('div');
                    dot.className = 'progress-dot cursor-pointer transition-all duration-300';
                    dot.setAttribute('data-index', index);
                    dot.title = lesson.title;
                    progressDots.appendChild(dot);
                });

                // Set first tab active
                const firstBtn = tabNav.querySelector('.tab-btn');
                const firstContent = tabContainer.querySelector('.tab-content');
                if (firstBtn) firstBtn.classList.add('bg-[#4f46e5]', 'text-white', 'shadow-lg', 'shadow-[#4f46e5]/30');
                if (firstContent) firstContent.classList.add('active');

                // Set first dot active
                const dots = progressDots.querySelectorAll('.progress-dot');
                if (dots[0]) dots[0].classList.add('active');

                updateProgressText(0);

                // Add click listeners
                tabNav.querySelectorAll('.tab-btn').forEach((btn, index) => {
                    btn.addEventListener('click', function() {
                        const tabId = this.getAttribute('data-tab');
                        activateTab(tabId, index);
                    });
                });

                // Add dot click listeners
                dots.forEach((dot, index) => {
                    dot.addEventListener('click', function() {
                        const btn = tabNav.querySelectorAll('.tab-btn')[index];
                        if (btn) btn.click();
                    });
                });
            }

            function activateTab(tabId, index) {
                // Remove active from all
                tabNav.querySelectorAll('.tab-btn').forEach(btn => {
                    btn.classList.remove('bg-[#4f46e5]', 'text-white', 'shadow-lg', 'shadow-[#4f46e5]/30');
                });
                tabContainer.querySelectorAll('.tab-content').forEach(content => {
                    content.classList.remove('active');
                });
                progressDots.querySelectorAll('.progress-dot').forEach(dot => {
                    dot.classList.remove('active');
                });

                // Activate target
                const targetBtn = tabNav.querySelector(`.tab-btn[data-tab="${tabId}"]`);
                const targetContent = tabContainer.querySelector(`#${tabId}`);
                const targetDot = progressDots.querySelectorAll('.progress-dot')[index];

                if (targetBtn) {
                    targetBtn.classList.add('bg-[#4f46e5]', 'text-white', 'shadow-lg', 'shadow-[#4f46e5]/30');
                }
                if (targetContent) {
                    targetContent.classList.add('active');
                }
                if (targetDot) {
                    targetDot.classList.add('active');
                }

                currentTab = index;
                updateProgressText(index);
                updateCompletedDots(index);

                // Save to localStorage
                try {
                    localStorage.setItem('pythonLessonTab', tabId);
                } catch (e) { /* ignore */ }
            }

            function updateProgressText(index) {
                progressText.textContent = `${index + 1} / ${lessons.length}`;
            }

            function updateCompletedDots(currentIndex) {
                const dots = progressDots.querySelectorAll('.progress-dot');
                dots.forEach((dot, index) => {
                    if (index < currentIndex) {
                        dot.classList.add('completed');
                    } else if (index === currentIndex) {
                        dot.classList.remove('completed');
                    } else {
                        dot.classList.remove('completed');
                    }
                });
            }

            // ===== RESTORE LAST TAB =====
            function restoreLastTab() {
                try {
                    const savedTab = localStorage.getItem('pythonLessonTab');
                    if (savedTab) {
                        const index = lessons.findIndex(l => l.id === savedTab);
                        if (index !== -1) {
                            const btn = tabNav.querySelectorAll('.tab-btn')[index];
                            if (btn) btn.click();
                            return;
                        }
                    }
                } catch (e) { /* ignore */ }
                // Default: first tab
                const firstBtn = tabNav.querySelector('.tab-btn');
                if (firstBtn) firstBtn.click();
            }

            // ===== BACK TO TOP =====
            const backTopBtn = document.getElementById('backTop');

            window.addEventListener('scroll', function() {
                if (window.scrollY > 400) {
                    backTopBtn.classList.add('visible');
                } else {
                    backTopBtn.classList.remove('visible');
                }
            });

            backTopBtn.addEventListener('click', function() {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });

            // ===== KEYBOARD NAVIGATION =====
            document.addEventListener('keydown', function(e) {
                if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                    e.preventDefault();
                    const next = (currentTab + 1) % lessons.length;
                    const btn = tabNav.querySelectorAll('.tab-btn')[next];
                    if (btn) btn.click();
                } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                    e.preventDefault();
                    const prev = (currentTab - 1 + lessons.length) % lessons.length;
                    const btn = tabNav.querySelectorAll('.tab-btn')[prev];
                    if (btn) btn.click();
                }
            });

            // ===== RUN CODE FUNCTION (without input) =====
            window.runCode = function(editorId, outputId) {
                const editor = document.getElementById(editorId);
                const output = document.getElementById(outputId);
                const code = editor.value;

                // Clear previous output
                output.textContent = '';
                output.classList.remove('error');

                // Capture stdout
                let capturedOutput = [];
                const originalPrint = console.log;
                console.log = function(...args) {
                    capturedOutput.push(args.map(arg =>
                        typeof arg === 'object' ? JSON.stringify(arg, null, 2) : String(arg)
                    ).join(' '));
                };

                try {
                    // Execute code
                    const result = new Function(code)();
                    if (result !== undefined && result !== null) {
                        capturedOutput.push(String(result));
                    }
                    output.textContent = capturedOutput.join('\n') || 'កូដដំណើរការបានត្រឹមត្រូវ (គ្មានលទ្ធផល)';
                } catch (error) {
                    output.textContent = `❌ កំហុស: ${error.message}`;
                    output.classList.add('error');
                } finally {
                    console.log = originalPrint;
                }
            };

            // ===== RUN CODE WITH INPUT =====
            window.runCodeWithInput = function(editorId, outputId) {
                const editor = document.getElementById(editorId);
                const output = document.getElementById(outputId);
                let code = editor.value;

                // Clear previous output
                output.textContent = '';
                output.classList.remove('error');

                // Find all input() calls and replace with prompt
                const inputRegex = /input\s*\(([^)]*)\)/g;
                const inputMatches = code.match(inputRegex);

                if (inputMatches) {
                    // Collect all input prompts
                    const prompts = [];
                    let tempCode = code;
                    let match;
                    const regex = /input\s*\(([^)]*)\)/g;
                    while ((match = regex.exec(code)) !== null) {
                        const promptText = match[1] ? eval(match[1]) : '';
                        prompts.push(promptText);
                    }

                    // Replace input() with prompt values
                    let values = [];
                    for (let i = 0; i < prompts.length; i++) {
                        const val = prompt(prompts[i] || 'បញ្ចូលទិន្នន័យ:', '');
                        values.push(val !== null ? `"${val}"` : '""');
                    }

                    // Replace input() calls with the captured values
                    let index = 0;
                    code = code.replace(/input\s*\([^)]*\)/g, () => {
                        return values[index++] || '""';
                    });
                }

                // Capture stdout
                let capturedOutput = [];
                const originalPrint = console.log;
                console.log = function(...args) {
                    capturedOutput.push(args.map(arg =>
                        typeof arg === 'object' ? JSON.stringify(arg, null, 2) : String(arg)
                    ).join(' '));
                };

                try {
                    const result = new Function(code)();
                    if (result !== undefined && result !== null) {
                        capturedOutput.push(String(result));
                    }
                    output.textContent = capturedOutput.join('\n') || 'កូដដំណើរការបានត្រឹមត្រូវ (គ្មានលទ្ធផល)';
                } catch (error) {
                    output.textContent = `❌ កំហុស: ${error.message}`;
                    output.classList.add('error');
                } finally {
                    console.log = originalPrint;
                }
            };

            // ===== INIT =====
            generateTabs();

            // Use setTimeout to ensure DOM is ready
            setTimeout(() => {
                restoreLastTab();
            }, 100);

            // ===== CONSOLE WELCOME =====
            console.log('%c🐍 Python Lessons in Khmer', 'font-size:24px; font-weight:bold; color:#4f46e5;');
            console.log('%cចុច ← → ដើម្បីប្តូរមេរៀន!', 'font-size:14px; color:#94a3b8;');
            console.log(`📚 ${lessons.length} មេរៀនសរុប`);

        })();
    </script>
